<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Export — wallpaper.png generator</title>
<style>
  body { margin: 0; background: #111; color: #ddd; font-family: -apple-system, sans-serif; }
  #ui { position: fixed; top: 12px; left: 12px; z-index: 10; display: flex; gap: 10px; align-items: center; }
  button { font-size: 14px; padding: 8px 16px; border-radius: 8px; border: none; background: #0a84ff; color: #fff; cursor: pointer; }
  #status { font-size: 13px; }
  /* Preview is downscaled to fit; the actual capture is full 2× resolution offscreen. */
  canvas { display: block; max-width: 100vw; height: auto; }
</style>
</head>
<body>

<!--
  THROWAWAY capture page for Demo 3's wallpaper.png. NOT part of Demo 2's runtime.
  Renders ONLY the background grid mesh — reusing Demo 2's real config.js constants
  and the SAME shader from main.js — at the fully-revealed steady state
  (u_warpStrength = WARP_STRENGTH, u_reveal = 1.0), orthographically (flat, no
  perspective), at 2× resolution (6880×2880). Click Download → wallpaper.png.
  After capturing, drop the file at demo3-export/assets/wallpaper.png and delete this.
-->

<div id="ui">
  <button id="dl">Download wallpaper.png</button>
  <span id="status">rendering…</span>
</div>

<canvas id="gl"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import {
  DESKTOP_W, DESKTOP_H, GRID_CELL_PX,
  WARP_DEADZONE, WARP_POWER, WARP_STRENGTH,
  GRID_LINE_CORE_PX, GRID_LINE_GLOW_PX, GRID_GLOW_STRENGTH,
  GRID_EDGE_FADE_START, GRID_INTENSITY,
} from './js/config.js';

// 2× supersample for a sharp plate on large displays/projectors.
const SCALE = 2;
const OUT_W = DESKTOP_W * SCALE;   // 6880
const OUT_H = DESKTOP_H * SCALE;   // 2880

const gl = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(OUT_W, OUT_H, false);
renderer.setPixelRatio(1); // buffer is already full 2× resolution

const scene = new THREE.Scene();

// Orthographic camera spanning exactly -1..1 in both axes → the plane fills the frame
// flat (no perspective foreshortening), which is what a flat DOM background wants.
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
camera.position.z = 1;

// ── SAME shader as Demo 2's main.js bgMesh ──
const _vertSrc = /* glsl */`
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const _fragSrc = /* glsl */`
  uniform float u_freqX;
  uniform float u_freqY;
  uniform float u_deadZone;
  uniform float u_warpPower;
  uniform float u_warpStrength;
  uniform float u_coreWidth;
  uniform float u_glowWidth;
  uniform float u_glowStrength;
  uniform float u_edgeFadeStart;
  uniform float u_gridIntensity;
  uniform float u_reveal;
  uniform vec3  u_bgColor;
  uniform vec3  u_doorColor;
  uniform vec3  u_lineColor;
  uniform vec3  u_glowColor;
  varying vec2 vUv;

  void main() {
    float centerX = (vUv.x - 0.5) * 2.0;
    float centerY = (vUv.y - 0.5) * 2.0;
    float flankDist = max(0.0, abs(centerX) - u_deadZone) / (1.0 - u_deadZone);
    float warp = pow(flankDist, u_warpPower) * u_warpStrength;
    float gridXcoord = centerX + sign(centerX) * warp;
    float innerDeriv = 1.0 / (1.0 - u_deadZone);
    float derivative = u_warpPower * pow(flankDist, max(0.0, u_warpPower - 1.0)) * u_warpStrength * innerDeriv;
    float localScale = 1.0 / (1.0 + derivative);
    float gridYcoord = centerY / localScale;
    vec2 gridUv = vec2(gridXcoord * u_freqX, gridYcoord * u_freqY) * 0.5;
    vec2 gridDist = abs(fract(gridUv - 0.5) - 0.5) / fwidth(gridUv);
    float line = min(gridDist.x, gridDist.y);
    float core = 1.0 - smoothstep(0.0, u_coreWidth, line);
    float glow = exp(-line / u_glowWidth) * u_glowStrength;
    float density = length(fwidth(gridUv));
    core *= 1.0 - smoothstep(0.35, 0.7, density);
    float edgeFade = 1.0 - smoothstep(u_edgeFadeStart, 1.0, abs(centerX));
    core *= edgeFade;
    glow *= edgeFade;
    vec3 col = u_bgColor;
    col += u_glowColor * glow * u_gridIntensity;
    col = mix(col, u_lineColor, core * u_gridIntensity);
    float doorT = step(u_reveal, abs(centerX));
    vec3 finalCol = mix(clamp(col, 0.0, 1.0), u_doorColor, doorT);
    gl_FragColor = vec4(finalCol, 1.0);
  }
`;

const mesh = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),   // fills the -1..1 ortho frame exactly
  new THREE.ShaderMaterial({
    uniforms: {
      u_freqX:        { value: DESKTOP_W / GRID_CELL_PX },
      u_freqY:        { value: DESKTOP_H / GRID_CELL_PX },
      u_deadZone:     { value: WARP_DEADZONE },
      u_warpPower:    { value: WARP_POWER },
      u_warpStrength: { value: WARP_STRENGTH },   // STEADY STATE (Demo 2 animates 0 → this)
      u_coreWidth:    { value: GRID_LINE_CORE_PX },
      u_glowWidth:    { value: GRID_LINE_GLOW_PX },
      u_glowStrength: { value: GRID_GLOW_STRENGTH },
      u_edgeFadeStart:{ value: GRID_EDGE_FADE_START },
      u_gridIntensity:{ value: GRID_INTENSITY },
      u_reveal:       { value: 1.0 },             // doors fully open
      u_bgColor:      { value: new THREE.Color(0x0d1b3e) },
      u_doorColor:    { value: new THREE.Color(0xaaaadd) },
      u_lineColor:    { value: new THREE.Color(0xe6eeff) },
      u_glowColor:    { value: new THREE.Color(0x0a84ff) },
    },
    vertexShader:   _vertSrc,
    fragmentShader: _fragSrc,
  })
);
scene.add(mesh);

renderer.render(scene, camera);
document.getElementById('status').textContent = `rendered ${OUT_W}×${OUT_H}`;

document.getElementById('dl').addEventListener('click', () => {
  renderer.render(scene, camera);  // ensure fresh buffer before reading
  gl.toBlob((blob) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'wallpaper.png';
    a.click();
    URL.revokeObjectURL(a.href);
    document.getElementById('status').textContent = 'downloaded wallpaper.png';
  }, 'image/png');
});
</script>
</body>
</html>
